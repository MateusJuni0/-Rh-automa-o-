<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'">
  <title>Vera · Login</title>
  <style>
    /* Apollo dark — estilos inline para não depender de bundler separado */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0E1116;
      color: #E6E8EB;
      font-family: system-ui, -apple-system, sans-serif;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-app-region: drag; /* drag para mover a janela sem frame */
    }
    .card {
      background: #141820;
      border: 1px solid #26313F;
      border-radius: 12px;
      padding: 40px;
      width: 340px;
      -webkit-app-region: no-drag;
    }
    .logo { text-align: center; margin-bottom: 24px; }
    .logo-v { font-size: 48px; font-weight: 800; color: #5DCAA5; line-height: 1; }
    .logo-name { font-size: 18px; font-weight: 600; color: #E6E8EB; margin-top: 6px; }
    .logo-sub { font-size: 13px; color: #8A96A8; margin-top: 4px; }
    .field { margin-bottom: 16px; }
    label { display: block; font-size: 13px; color: #8A96A8; margin-bottom: 6px; }
    input {
      width: 100%;
      background: #1B2030;
      border: 1px solid #26313F;
      border-radius: 8px;
      color: #E6E8EB;
      padding: 10px 12px;
      font-size: 14px;
      outline: none;
      transition: border-color 0.15s;
    }
    input:focus { border-color: #5DCAA5; }
    .btn {
      width: 100%;
      background: #5DCAA5;
      color: #0E1116;
      border: none;
      border-radius: 8px;
      padding: 12px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.15s;
    }
    .btn:hover { background: #4AB892; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .error {
      background: rgba(226,75,74,0.12);
      border: 1px solid rgba(226,75,74,0.3);
      color: #E24B4A;
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 13px;
      margin-bottom: 16px;
      display: none;
    }
    .dev-badge {
      text-align: center;
      font-size: 11px;
      color: #4A5568;
      margin-top: 16px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="logo-v">V</div>
      <div class="logo-name">Vera · IRIS</div>
      <div class="logo-sub">Entra para começar</div>
    </div>
    <div class="error" id="err"></div>
    <div class="field">
      <label for="email">Email</label>
      <input type="email" id="email" placeholder="filipa@iris.pt" autocomplete="email" />
    </div>
    <div class="field">
      <label for="password">Senha</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" />
    </div>
    <button class="btn" id="btn" type="button">Entrar</button>
    <div class="dev-badge" id="dev-badge"></div>
  </div>
  <script>
    const api = window.loginApi;
    const btn = document.getElementById('btn');
    const errEl = document.getElementById('err');
    const devBadge = document.getElementById('dev-badge');

    // Badge de dev: preload pode injetar flag ALLOW_DEV_SESSION via env futuramente;
    // por agora mostra sempre para facilitar testes
    if (devBadge) devBadge.textContent = 'Modo dev · qualquer credencial aceite';

    function showError(msg) {
      if (!errEl) return;
      errEl.textContent = msg;
      errEl.style.display = 'block';
    }

    function hideError() {
      if (errEl) errEl.style.display = 'none';
    }

    if (btn) {
      btn.addEventListener('click', () => {
        const emailEl = document.getElementById('email');
        const passwordEl = document.getElementById('password');
        const email = emailEl ? emailEl.value.trim() : '';
        const password = passwordEl ? passwordEl.value : '';

        hideError();

        if (!email || !password) {
          showError('Preenche email e senha.');
          return;
        }

        btn.disabled = true;
        btn.textContent = 'A entrar…';
        api.submit(email, password);
      });
    }

    // Ouvir erros vindos do processo main
    api.onError((msg) => {
      showError(msg);
      if (btn) {
        btn.disabled = false;
        btn.textContent = 'Entrar';
      }
    });

    // Enter para submeter em qualquer campo
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && btn && !btn.disabled) btn.click();
    });
  </script>
</body>
</html>
