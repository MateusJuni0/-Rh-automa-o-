# Empacotamento do desktop (APP-DESKTOP §6). Win NSIS + macOS DMG.
# Code-signing/notarização + auto-update assinado = HANDOVER (KEYS-TODO): precisam de
# certificados (Authenticode EV / Developer ID) e do binário electron — fora deste loop.
appId: pt.cmtecnologia.vera
productName: Vera
directories:
  output: release
  buildResources: build
# `files` aponta para a saída do bundler (renderer + main/preload compilados → dist-build).
files:
  - "dist-build/**"
  - "package.json"
win:
  target: nsis
nsis:
  oneClick: false
  perMachine: false
mac:
  target: dmg
  category: public.app-category.business
