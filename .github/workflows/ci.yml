name: CI

on:
  push:
  pull_request:

jobs:
  verify:
    name: typecheck · lint · build · test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint (Biome)
        run: pnpm lint

      - name: Build
        run: pnpm build

      # Sem TEST_DATABASE_URL → os testes de integração (Postgres) saltam-se sozinhos (describe.skipIf);
      # correm os testes puros + render. ZERO segredos no workflow.
      - name: Test
        run: pnpm test
